<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Typing Garden</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>

    </head>
    <body>

        <div id="ui">
            <h1>typing garden</h1>
<p id="hint">press some keys and see what happens :)</p>
            <div id="stats">
                <span><b id="flowers">0</b> flowers</span>
                <span><b id="vines">0</b> vines</span>
                <span><b id="breaths">0</b> breaths</span>
            </div>
<button id="clear-btn">reset</button>
        </div>
        <div id="canvas-container"></div>
        <script src="sketch.js"></script>

    <script>
      document.getElementById('clear-btn').addEventListener('click', () => {
      state.plants  = [];
state.breaths = [];
state.stats   = { flowers: 0, vines: 0, breaths: 0 };
updateStatsDisplay();

    
      });
    </script>
    </body>
    
</html>
